# ===========================================
# CONFIGURAZIONE SPRING BOOT
# ===========================================
# Questo file e' il punto centrale di configurazione dell'applicazione.
# Spring Boot lo legge automaticamente all'avvio.

# Nome dell'applicazione (visibile nei log)
spring.application.name=brief_registrazione_utente

# Porta del server Tomcat embedded (default: 8080)
server.port=8080

# ===========================================
# DATASOURCE PostgreSQL
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/brief_registrazione_utente
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================================
# LIQUIBASE
# ===========================================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ===========================================
# LOGGING
# ===========================================
# Livello di log per il nostro package (TRACE > DEBUG > INFO > WARN > ERROR)
logging.level.com.emiliomoscatiello.brief_registrazione_utente=DEBUG
